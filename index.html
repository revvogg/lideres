// Troque por chamadas de API para deploy multi-usuário
const DB={
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}},
  keys:(prefix='')=>Object.keys(localStorage).filter(k=>k.startsWith(prefix)),

// ─── UTILS ────────────────────────────────────────────────────
const gid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const gcalUrl=({title='',date='2026-01-01',time='10:00',duration='2',desc=''})=>{
  const dt=date.replace(/-/g,'');const[h,m]=(time||'10:00').split(':');
  const eh=String(parseInt(h)+(parseInt(duration)||2)).padStart(2,'0');
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${dt}T${h}${m}00/${dt}T${eh}${m}00&details=${encodeURIComponent(desc)}`;
};
const ytId=(url)=>{if(!url)return null;const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([^&?/]+)/);return m?m[1]:null;};
const stepsOf=(s)=>s?[s.wsDone,s.acDone,s.missionText,s.dropAnswer,s.pulseScore!=null].filter(Boolean).length:0;

  workshop:{title:'Liderança que Direciona Pessoas',host:'Tatiana Velloso',date:'2026-06-01',time:'10:00',duration:'2',format:'Online',link:'',desc:'Como transformar estratégia em clareza e direção para o time.'},

// ─── ÍCONES (Font Awesome wrappers) ──────────────────────────
const Ic=({n,sz=14,c='currentColor'})=><i className={`fas fa-${n}`} style={{fontSize:sz,color:c}}/>;

// ─── LOGIN ────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[name,setName]=useState('');const[area,setArea]=useState('');const[err,setErr]=useState('');
  const go=()=>{if(!name.trim()||!area){setErr('Preencha todos os campos.');return;}onLogin({name:name.trim(),area});};
  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{position:'fixed',inset:0,pointerEvents:'none'}}>
        <div style={{position:'absolute',width:500,height:500,left:-150,top:-150,borderRadius:'50%',background:C.blue,opacity:0.07}}/>
        <div style={{position:'absolute',width:400,height:400,right:-100,bottom:-100,borderRadius:'50%',background:C.orange,opacity:0.09}}/>
      </div>
      <div style={{width:380,background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:36,position:'relative',zIndex:1}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:6,color:C.blueL,marginBottom:6}}>REVVO ORIGINALS</div>
          <div style={{fontSize:34,fontWeight:900,color:C.orange,lineHeight:1}}>A EVOLUÇÃO DA</div>
          <div style={{fontSize:34,fontWeight:900,color:C.text,lineHeight:1.1,marginBottom:8}}>LIDERANÇA 2026</div>
          <div style={{fontSize:12,color:C.muted}}>Dossiê do Líder Revvolucionário</div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:9,fontWeight:700,letterSpacing:5,color:C.muted,display:'block',marginBottom:6}}>SEU NOME</label>
          <input style={{width:'100%',padding:'11px 14px',background:C.card2,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}} placeholder="Como você se chama?" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:9,fontWeight:700,letterSpacing:5,color:C.muted,display:'block',marginBottom:6}}>SUA ÁREA</label>
          <select style={{width:'100%',padding:'11px 14px',background:C.card2,color:area?C.text:C.muted,border:`1px solid ${C.border}`,borderRadius:8,fontSize:14,outline:'none'}} value={area} onChange={e=>setArea(e.target.value)}>

          Acesso admin: clique em <strong style={{color:C.orange}}>ADMIN</strong> na barra superior
        </div>
      </div>
    </div>
  );
}

// ─── HERO ─────────────────────────────────────────────────────

    <div style={{paddingTop:92,paddingBottom:56,paddingLeft:36,paddingRight:36,position:'relative',overflow:'hidden',minHeight:420}}>

function AdminPanel({config,onConfigSave,onClose}){
  const[view,setView]=useState('users');

  const[saved,setSaved]=useState(false);

  const[localUsers,setLocalUsers]=useState([]);
  const[exportText,setExportText]=useState('');

  useEffect(()=>{
    // Load all users from localStorage keys
    const users=[];
    DB.keys('user_').forEach(k=>{
      if(k==='user_profile')return;
      const u=DB.get(k);if(u&&u.name)users.push({...u,storageKey:k});
    });
    // Also load by subs keys
    const allSubs=[];
    DB.keys('subs_').forEach(k=>{
      const uid=k.replace('subs_','');
      const subs=DB.get(k);
      const existing=users.find(u=>u.id===uid);
      if(!existing&&subs){
        allSubs.push({id:uid,name:'Usuário '+uid.slice(-4),area:'?',storageKey:k,subs});
      }
    });
    // Merge user profiles with subs
    const merged=users.map(u=>({...u,subs:DB.get('subs_'+u.id)||{}}));
    setLocalUsers([...merged,...allSubs]);
  },[]);

  const saveAll=()=>{onConfigSave(ec);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const upd=(k,sec,f,v)=>setEc(prev=>{const n=JSON.parse(JSON.stringify(prev));if(sec)n[k][sec][f]=v;else n[k][f]=v;return n;});
  const s=ec[es];

  const exportAll=()=>{
    const data={users:localUsers.map(u=>({name:u.name,area:u.area,joinedAt:u.joinedAt,subs:u.subs})),exportedAt:new Date().toISOString()};
    setExportText(JSON.stringify(data,null,2));
  };

  const importAll=()=>{
    try{
      const data=JSON.parse(importText);
      if(data.users){data.users.forEach(u=>{const id=gid();DB.set('user_'+id,{name:u.name,area:u.area,id,joinedAt:u.joinedAt});if(u.subs)DB.set('subs_'+id,u.subs);});}
      alert('Importação concluída! Recarregue a página para ver.');
    }catch{alert('JSON inválido.');}
  };

  const Field=({label,val,onChange,multi=false})=>(
    <div>
      <label style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.muted,display:'block',marginBottom:5}}>{label}</label>
      {multi
        ?<textarea rows={3} style={{width:'100%',padding:'9px 12px',background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,outline:'none',resize:'none'}} value={val||''} onChange={e=>onChange(e.target.value)}/>
        :<input style={{width:'100%',padding:'9px 12px',background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,outline:'none'}} value={val||''} onChange={e=>onChange(e.target.value)}/>
      }
    </div>
  );

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,overflowY:'auto',background:C.bg}}>
      <div style={{maxWidth:780,margin:'0 auto',padding:28}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:30,paddingTop:16}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.orange,marginBottom:6}}>PAINEL ADMINISTRATIVO</div>
            <h1 style={{fontSize:26,fontWeight:900,color:C.text}}>A Evolução da Liderança 2026</h1>
          </div>
          <button style={{background:C.card2,border:`1px solid ${C.border}`,color:C.muted,padding:'9px 18px',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer'}} onClick={onClose}>← VOLTAR</button>
        </div>
        {/* Tab toggle */}
        <div style={{display:'flex',gap:10,marginBottom:28}}>
          {[{id:'users',l:'Usuários',ic:'users'},{id:'config',l:'Configurar',ic:'sliders-h'},{id:'data',l:'Dados',ic:'database'}].map(v=>(
            <Btn key={v.id} color={view===v.id?C.orange:C.card2} outline={view!==v.id} onClick={()=>setView(v.id)}>
              <Ic n={v.ic} sz={13}/>{v.l}
            </Btn>
          ))}
        </div>

        {/* USUÁRIOS */}
        {view==='users'&&(
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.muted,marginBottom:16}}>
              {localUsers.length} LÍDER{localUsers.length!==1?'ES':''} CADASTRADO{localUsers.length!==1?'S':''} NESTE BROWSER
            </div>
            {localUsers.length===0&&(
              <div style={{padding:48,textAlign:'center',background:C.card,border:`1px solid ${C.border}`,borderRadius:14}}>
                <Ic n="users" sz={32} c={C.muted}/>
                <div style={{marginTop:12,fontSize:13,color:C.muted}}>Nenhum líder cadastrado neste browser ainda.</div>
                <div style={{marginTop:6,fontSize:11,color:C.muted}}>Use <strong style={{color:C.orange}}>Dados → Importar</strong> para adicionar submissões de outros líderes.</div>
              </div>
            )}
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              {localUsers.map((u,i)=>{
                const total=SKEYS.reduce((a,k)=>a+stepsOf(u.subs?.[k]),0);
                return(
                  <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20}}>
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:15,color:C.text}}>{u.name}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:2}}>{u.area}{u.joinedAt&&` · desde ${new Date(u.joinedAt).toLocaleDateString('pt-BR')}`}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontWeight:900,fontSize:26,color:C.orange}}>{total}</div>
                        <div style={{fontSize:10,color:C.muted}}>de 30 etapas</div>
                      </div>
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
                      {SKEYS.map(k=>{
                        const p2=stepsOf(u.subs?.[k]);const m=SM[k];
                        return<div key={k} style={{fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:8,background:p2>0?`${m.phaseColor}18`:C.card2,color:p2>0?m.phaseColor:C.muted,border:`1px solid ${p2>0?m.phaseColor+'44':C.border}`}}>{m.code} {p2}/5</div>;
                      })}
                    </div>
                    {/* Evidências */}
                    {SKEYS.filter(k=>u.subs?.[k]?.missionText).map(k=>(
                      <div key={k} style={{marginTop:8,background:C.card2,borderRadius:8,padding:12}}>
                        <div style={{fontSize:9,fontWeight:700,letterSpacing:3,color:C.orange,marginBottom:4}}>{SM[k].code} · EVIDÊNCIA DA MISSÃO</div>
                        <div style={{fontSize:12,color:C.muted,lineHeight:1.5,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{u.subs[k].missionText}</div>
                      </div>
                    ))}
                    {SKEYS.filter(k=>u.subs?.[k]?.pulseScore!=null).map(k=>(
                      <div key={k+'p'} style={{marginTop:8,background:C.card2,borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
                        <div style={{fontSize:9,fontWeight:700,letterSpacing:3,color:C.blueL}}>{SM[k].code} · PULSE</div>
                        <div style={{fontSize:14,fontWeight:900,color:u.subs[k].pulseScore>=8?C.green:u.subs[k].pulseScore>=5?C.orange:C.red}}>{u.subs[k].pulseScore}/10</div>
                        {u.subs[k].pulseComment&&<div style={{fontSize:11,color:C.muted,flex:1}}>{u.subs[k].pulseComment}</div>}
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* CONFIGURAR */}
        {view==='config'&&s&&(
          <div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:22}}>
              {SKEYS.map(k=>(
                <button key={k} onClick={()=>setEs(k)} style={{padding:'6px 14px',borderRadius:8,fontSize:11,fontWeight:700,background:es===k?SM[k].phaseColor:C.card2,color:es===k?'#fff':C.muted,border:'none',cursor:'pointer'}}>{SM[k].code}</button>
              ))}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:18}}>
              {/* Status */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.orange,marginBottom:12}}>STATUS DA TEMPORADA</div>
                <div style={{display:'flex',gap:10}}>
                  {['available','coming_soon'].map(st=>(
                    <button key={st} onClick={()=>upd(es,null,'status',st)} style={{padding:'9px 18px',borderRadius:8,fontSize:12,fontWeight:700,background:s.status===st?C.orange:C.card2,color:s.status===st?'#fff':C.muted,border:'none',cursor:'pointer'}}>
                      {st==='available'?'✓ Disponível':'⏳ Em breve'}
                    </button>
                  ))}
                </div>
              </div>
              {/* Workshop */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.orange,marginBottom:16}}>E01 · WORKSHOP</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <Field label="TÍTULO" val={s.workshop?.title} onChange={v=>upd(es,'workshop','title',v)}/>
                  <Field label="FACILITADOR" val={s.workshop?.host} onChange={v=>upd(es,'workshop','host',v)}/>
                  <Field label="DATA (AAAA-MM-DD)" val={s.workshop?.date} onChange={v=>upd(es,'workshop','date',v)}/>
                  <Field label="HORÁRIO" val={s.workshop?.time} onChange={v=>upd(es,'workshop','time',v)}/>
                  <Field label="DURAÇÃO (HORAS)" val={s.workshop?.duration} onChange={v=>upd(es,'workshop','duration',v)}/>
                  <Field label="FORMATO" val={s.workshop?.format} onChange={v=>upd(es,'workshop','format',v)}/>
                  <div style={{gridColumn:'1 / -1'}}><Field label="LINK DO ENCONTRO" val={s.workshop?.link} onChange={v=>upd(es,'workshop','link',v)}/></div>
                  <div style={{gridColumn:'1 / -1'}}><Field label="DESCRIÇÃO" val={s.workshop?.desc} onChange={v=>upd(es,'workshop','desc',v)} multi/></div>
                </div>
              </div>
              {/* Academy */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.blueL,marginBottom:16}}>E02 · REVVO ACADEMY</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <Field label="TÍTULO DO CURSO" val={s.academy?.title} onChange={v=>upd(es,'academy','title',v)}/>
                  <Field label="PRAZO" val={s.academy?.deadline} onChange={v=>upd(es,'academy','deadline',v)}/>
                  <div style={{gridColumn:'1 / -1'}}><Field label="LINK DO CURSO" val={s.academy?.link} onChange={v=>upd(es,'academy','link',v)}/></div>
                  <div style={{gridColumn:'1 / -1'}}><Field label="DESCRIÇÃO" val={s.academy?.desc} onChange={v=>upd(es,'academy','desc',v)} multi/></div>
                </div>
              </div>
              {/* Drop */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.blueL,marginBottom:16}}>DROP MENSAL</div>
                <div style={{display:'flex',flexDirection:'column',gap:12}}>
                  <Field label="URL DO VÍDEO (YouTube)" val={s.drop?.url} onChange={v=>upd(es,'drop','url',v)}/>
                  <Field label="TÍTULO DO DROP" val={s.drop?.title} onChange={v=>upd(es,'drop','title',v)}/>
                  <Field label="QUESTÃO REFLEXIVA" val={s.drop?.q} onChange={v=>upd(es,'drop','q',v)} multi/>
                </div>
              </div>
              {/* Pulse */}
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.purple,marginBottom:16}}>E04 · PULSE OPERACIONAL</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div style={{gridColumn:'1 / -1'}}><Field label="PERGUNTA DO PULSE" val={s.pulse?.q} onChange={v=>upd(es,'pulse','q',v)} multi/></div>
                  <div style={{gridColumn:'1 / -1'}}><Field label="ÍNDICE-ALVO GPTW" val={s.pulse?.lbl} onChange={v=>upd(es,'pulse','lbl',v)}/></div>
                  <Field label="BASELINE (%)" val={String(s.pulse?.b||'')} onChange={v=>upd(es,'pulse','b',parseInt(v)||0)}/>
                  <Field label="META (%)" val={String(s.pulse?.t||'')} onChange={v=>upd(es,'pulse','t',parseInt(v)||0)}/>
                </div>
              </div>
              <Btn color={saved?C.green:C.orange} onClick={saveAll}>
                <Ic n={saved?'check':'save'} sz={13}/>{saved?'CONFIGURAÇÕES SALVAS!':'SALVAR CONFIGURAÇÕES'}
              </Btn>
            </div>
          </div>
        )}

        {/* DADOS */}
        {view==='data'&&(
          <div style={{display:'flex',flexDirection:'column',gap:20}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.orange,marginBottom:10}}>EXPORTAR DADOS</div>
              <p style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:14}}>Gera um JSON com todos os usuários e submissões deste browser. Compartilhe com o admin de outro browser para consolidar.</p>
              <Btn color={C.orange} onClick={exportAll}><Ic n="download" sz={13}/>EXPORTAR TODOS OS DADOS</Btn>
              {exportText&&<textarea rows={8} style={{marginTop:14,width:'100%',padding:12,background:C.card2,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,outline:'none',resize:'none',fontFamily:'monospace'}} value={exportText} readOnly onClick={e=>e.target.select()}/>}
            </div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.blueL,marginBottom:10}}>IMPORTAR SUBMISSÕES</div>
              <p style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:14}}>Cole aqui o JSON exportado de outro browser. Os dados serão adicionados a este browser.</p>
              <textarea rows={6} style={{width:'100%',padding:12,background:C.card2,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,outline:'none',resize:'none',fontFamily:'monospace',marginBottom:12}} placeholder='{"users":[...]}' value={importText} onChange={e=>setImportText(e.target.value)}/>
              <Btn color={C.blue} onClick={importAll}><Ic n="upload" sz={13}/>IMPORTAR</Btn>
            </div>
            <div style={{background:`${C.orange}0D`,border:`1px solid ${C.orange}33`,borderRadius:14,padding:20}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:4,color:C.orange,marginBottom:8}}>PRÓXIMO PASSO — DEPLOY MULTI-USUÁRIO</div>
              <p style={{fontSize:12,color:C.muted,lineHeight:1.65}}>
                Para o admin ver submissões em tempo real, sem importar manualmente, você precisará hospedar este arquivo num servidor com um backend simples (Node + SQLite ou Airtable). O código já está estruturado para isso — basta substituir as chamadas do objeto <code style={{color:C.orange,fontSize:11}}>DB</code> por chamadas à sua API.
              </p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[config,setConfig]=useState(makeDefault());
  const[subs,setSubs]=useState({});
  const[sel,setSel]=useState(null);
  const[adminMode,setAdminMode]=useState(false);
  const[showAdminLogin,setShowAdminLogin]=useState(false);

  useEffect(()=>{
    const u=DB.get('user_profile');
    if(u){setUser(u);const s=DB.get('subs_'+u.id);if(s)setSubs(s);}
    const cfg=DB.get('app_config');
    if(cfg)setConfig(prev=>({...prev,...cfg}));
    setLoading(false);
  },[]);

  const handleLogin=(profile)=>{
    const u={...profile,id:gid(),joinedAt:new Date().toISOString()};
    DB.set('user_profile',u);DB.set('user_'+u.id,u);
    setUser(u);
  };
  const handleLogout=()=>{DB.del('user_profile');setUser(null);setSubs({});setAdminMode(false);};
  const handleUpdate=(sk,patch)=>{
    const next={...subs,[sk]:{...subs[sk],...patch}};
    setSubs(next);DB.set('subs_'+user.id,next);
  };
  const handleConfigSave=(nc)=>{setConfig(nc);DB.set('app_config',nc);};

  if(loading)return null;
  if(!user)return <LoginScreen onLogin={handleLogin}/>;

  return(
    <div style={{minHeight:'100vh',background:C.bg,color:C.text}}>
      <NavBar user={user} onAdmin={()=>setShowAdminLogin(true)} onLogout={handleLogout}/>
      <Hero config={config} subs={subs} onSelect={setSel}/>
      <div style={{padding:'0 28px 80px',display:'flex',flexDirection:'column',gap:36}}>
        {PHASES.map(ph=>(
          <div key={ph.id}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
              <div style={{width:4,height:20,borderRadius:2,background:ph.color}}/>
              <h2 style={{fontSize:11,fontWeight:700,letterSpacing:5,color:ph.color}}>{ph.label.toUpperCase()}</h2>
            </div>
            <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
              {ph.keys.map(k=><SeasonCard key={k} k={k} config={config} subs={subs} onSelect={setSel}/>)}
            </div>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center',paddingBottom:28,fontSize:11,color:C.muted}}>
        <span style={{color:C.orange,fontStyle:'italic'}}>liderar é deixar evidência.</span> · Revvo Originals · A Evolução da Liderança 2026
      </div>
      {sel&&<Modal sk={sel} config={config} subs={subs[sel]||{}} onUpdate={(sk,p)=>handleUpdate(sk,p)} onClose={()=>setSel(null)}/>}
      {showAdminLogin&&<AdminLogin onOk={()=>{setAdminMode(true);setShowAdminLogin(false);}} onCancel={()=>setShowAdminLogin(false)}/>}
      {adminMode&&<AdminPanel config={config} onConfigSave={handleConfigSave} onClose={()=>setAdminMode(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
