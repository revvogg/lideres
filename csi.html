
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nv:#0B1628;--nv2:#0F1E38;--nv3:#162848;--nv4:#1C3358;
  --cy:#1AB8D8;--cy2:#0D8FAA;--cy3:rgba(26,184,216,.15);
  --or:#E8420A;--or2:#FF6B35;--orb:rgba(232,66,10,.12);
  --am:#EF9F27;--w:#fff;--w80:rgba(255,255,255,.8);--w60:rgba(255,255,255,.6);
  --w30:rgba(255,255,255,.3);--w15:rgba(255,255,255,.15);--w08:rgba(255,255,255,.08);
}
body{margin:0;padding:0;}
.wrap{background:var(--nv);min-height:100vh;font-family:var(--font-sans);width:100%;}

/* ENVELOPE */
.env-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;background:var(--nv2);}
.env-eyebrow{font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--cy);margin-bottom:1.75rem;text-align:center;}
.env-outer{width:min(360px,92vw);position:relative;margin-bottom:1.25rem;}
.env-hint{font-size:14px;color:var(--w30);margin-top:1.25rem;text-align:center;}
.env-btn{margin-top:1.25rem;background:var(--cy);border:none;border-radius:10px;padding:14px 40px;font-size:16px;font-weight:500;color:var(--nv);cursor:pointer;width:min(360px,92vw);}
.env-btn:hover{background:#22d0f0;}

/* CARTA */
.carta-wrap{padding:1.5rem;max-width:660px;margin:0 auto;}
.carta-paper{background:var(--nv3);border:1px solid var(--w15);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;}
.carta-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.1rem;padding-bottom:1rem;border-bottom:1px solid var(--w15);gap:12px;flex-wrap:wrap;}
.carta-classify{background:var(--orb);border:1px solid var(--or);border-radius:5px;padding:4px 12px;font-size:12px;letter-spacing:.1em;color:var(--or2);font-weight:500;white-space:nowrap;}
.carta-body{font-size:15px;color:var(--w80);line-height:1.8;}
.carta-body p{margin-bottom:1rem;}
.hl{color:var(--cy);font-weight:500;}
.hl-or{color:var(--or2);font-weight:500;}
.carta-ass{margin-top:1.1rem;padding-top:1rem;border-top:1px solid var(--w15);}
.qr-box{background:var(--nv4);border:1px dashed var(--cy2);border-radius:10px;padding:1.1rem;display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;}
.qr-ph{width:68px;height:68px;min-width:68px;background:var(--w08);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.qr-txt{font-size:14px;color:var(--w60);line-height:1.6;}
.qr-url{font-size:12px;color:var(--cy);margin-top:4px;word-break:break-all;}

/* HERO */
.hero{background:var(--nv2);padding:1rem 1.5rem;border-bottom:1px solid var(--w15);}
.logo-row{display:flex;align-items:center;gap:8px;margin-bottom:.6rem;}
.hero-logo{width:52px;height:42px;object-fit:contain;flex-shrink:0;}
.logo-txt-top{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--w30);}
.logo-txt-main{font-size:13px;font-weight:500;color:var(--w);}
.logo-txt-main span{color:var(--cy);}
.agent-pill{background:var(--w08);border:1px solid var(--w30);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--w60);margin-left:auto;white-space:nowrap;}
.hero-case-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.case-pill{background:var(--orb);border:1px solid var(--or);border-radius:5px;padding:3px 10px;font-size:11px;color:var(--or2);font-weight:500;letter-spacing:.06em;}
.hero-title{font-size:clamp(17px,4vw,22px);font-weight:500;color:var(--w);line-height:1.25;margin-bottom:3px;}
.hero-title em{color:var(--cy);font-style:normal;}
.hero-sub{font-size:13px;color:var(--w60);}
.sep{height:1px;background:var(--w15);}

/* ID */
.id-wrap{padding:1.5rem;max-width:560px;margin:0 auto;}
.lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--w30);margin-bottom:.4rem;}
.inp{background:var(--w08);border:1px solid var(--w30);border-radius:8px;padding:12px 16px;font-size:16px;color:var(--w);outline:none;width:100%;font-family:var(--font-sans);}
.inp::placeholder{color:var(--w30);}
.inp:focus{border-color:var(--cy);}
.sel{background:var(--w08);border:1px solid var(--w30);border-radius:8px;padding:12px 16px;font-size:16px;color:var(--w);outline:none;width:100%;font-family:var(--font-sans);}
.sel option{background:#1a2a45;}
.info-box{background:var(--w08);border:1px solid var(--w15);border-radius:10px;padding:1rem;}
.btn-p{background:var(--cy);border:none;border-radius:10px;padding:14px 24px;font-size:16px;font-weight:500;color:var(--nv);cursor:pointer;width:100%;margin-top:.85rem;}
.btn-p:hover{background:#22d0f0;}
.btn-o{background:transparent;border:1px solid var(--w30);border-radius:10px;padding:13px 20px;font-size:14px;color:var(--w60);cursor:pointer;width:100%;margin-top:.6rem;}
.btn-o:hover{border-color:var(--cy);color:var(--w);}

/* PROG */
.prog-wrap{padding:.75rem 1.5rem .1rem;max-width:660px;margin:0 auto;}
.prog-bar{display:flex;gap:4px;}
.ps{height:4px;border-radius:2px;flex:1;background:var(--w15);}
.ps.done{background:var(--cy);}
.ps.active{background:rgba(26,184,216,.4);}
.prog-lbl{font-size:11px;color:var(--w30);margin-top:4px;}

/* GAME */
.gw{padding:1.1rem 1.5rem;max-width:660px;margin:0 auto;}
.scene-card{background:var(--w08);border-left:3px solid var(--cy);border-radius:0 8px 8px 0;padding:.85rem 1rem;margin-bottom:.75rem;}
.scene-lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--cy);margin-bottom:5px;}
.scene-txt{font-size:15px;color:var(--w60);line-height:1.7;}
.tension-card{background:var(--orb);border:1px solid rgba(232,66,10,.3);border-radius:8px;padding:.85rem 1rem;margin-bottom:.75rem;}
.tension-lbl{font-size:15px;font-weight:500;color:var(--or2);margin-bottom:4px;}
.tension-txt{font-size:15px;color:rgba(255,150,100,.9);line-height:1.65;}

/* EVIDENCIAS */
.ev-card{background:var(--w08);border:1px solid var(--w15);border-radius:10px;padding:1rem;margin-bottom:.75rem;}
.ev-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.ev-num{width:32px;height:32px;min-width:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--nv3);border:1px solid var(--cy2);font-size:14px;font-weight:500;color:var(--cy);}
.ev-title{font-size:15px;font-weight:500;color:var(--w);}
.ev-meta{font-size:12px;color:var(--w30);margin-top:2px;}
.ev-body{font-size:14px;color:var(--w60);line-height:1.7;font-style:italic;margin-bottom:8px;}
.ev-flags-lbl{font-size:11px;color:var(--w30);margin-bottom:5px;}
.ev-flags{display:flex;gap:6px;flex-wrap:wrap;}
.ef{background:var(--w08);border:1px solid var(--w15);border-radius:6px;padding:6px 12px;font-size:13px;color:var(--w60);cursor:pointer;transition:all .15s;}
.ef:hover{border-color:var(--or);color:var(--or2);}
.ef.on{background:var(--orb);border-color:var(--or);color:var(--or2);}

/* SUSPEITOS */
.sus-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:.85rem;}
.sus-card{background:var(--w08);border:1px solid var(--w15);border-radius:10px;padding:1rem;cursor:pointer;text-align:center;transition:border-color .15s;}
.sus-card:hover{border-color:var(--am);}
.sus-card.sel{border:2px solid var(--am);background:rgba(239,159,39,.08);}
.sus-avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;}
.sus-name{font-size:14px;font-weight:500;color:var(--w);}
.sus-role{font-size:12px;color:var(--w30);margin-top:2px;}
.sus-motive{font-size:13px;color:var(--w60);margin-top:8px;line-height:1.5;display:none;text-align:left;}
.sus-card.sel .sus-motive{display:block;}

/* LAUDO */
.ta{background:var(--w08);border:1px solid var(--w30);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--w);outline:none;width:100%;font-family:var(--font-sans);resize:vertical;min-height:90px;line-height:1.7;}
.ta::placeholder{color:var(--w30);}
.ta:focus{border-color:var(--cy);}

/* VEREDICTO */
.verd-card{background:var(--nv3);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.75rem;}
.vtag{display:inline-block;border-radius:5px;padding:3px 10px;font-size:12px;font-weight:500;margin-bottom:.5rem;}
.vtag.ok{background:rgba(99,153,34,.2);color:#97C459;}
.vtag.par{background:rgba(239,159,39,.2);color:var(--am);}
.vtag.err{background:var(--orb);color:var(--or2);}
.vtitle{font-size:15px;font-weight:500;color:var(--w);margin-bottom:6px;}
.vtxt{font-size:14px;color:var(--w60);line-height:1.7;}
.profile-card{background:var(--cy3);border:1px solid rgba(26,184,216,.25);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.75rem;}
.pname{font-size:15px;font-weight:500;color:var(--cy);margin-bottom:3px;}
.pdesc{font-size:14px;color:var(--w60);line-height:1.65;}
.act-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:.65rem;}
.act-num{width:22px;height:22px;min-width:22px;border-radius:50%;background:var(--cy);color:var(--nv);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.act-txt{font-size:14px;color:var(--w60);line-height:1.6;}
.divider{height:1px;background:var(--w15);margin:.85rem 0;}
.share-row{display:flex;gap:8px;flex-wrap:wrap;}
.share-btn{flex:1;min-width:140px;background:var(--w08);border:1px solid var(--w15);border-radius:8px;padding:.75rem;font-size:13px;color:var(--w60);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.share-btn:hover{border-color:var(--cy);color:var(--w);}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>

};

function animateOpen(){
  const flap=document.getElementById('flap-g');
  const letter=document.getElementById('letter-g');
  if(!flap||!letter)return;
  flap.style.transform='rotateX(180deg)';
  letter.style.opacity='1';
  letter.style.transform='translateY(-62px)';
  setTimeout(()=>showCarta(),950);
}

function startGame(){
  const n=document.getElementById('i-n').value.trim();
  const a=document.getElementById('i-a').value;
  if(!n||!a){alert('Preencha seu nome e área antes de continuar.');return;}
  W._n=n;W._a=a;showEvidencias();
}

function showEvidencias(){
  let evs='';
  EVS.forEach(e=>{
    const flags=e.flags.map(f=>{
      const on=W._flags[e.id]&&W._flags[e.id].includes(f)?'on':'';
      return `<span class="ef ${on}" onclick="toggleFlag('${e.id}','${f}',this)">${f}</span>`;
    }).join('');
    evs+=`<div class="ev-card">
      <div class="ev-head">
        <div class="ev-num">${e.num}</div>
        <div><div class="ev-title">${e.title}</div><div class="ev-meta">${e.meta}</div></div>
      </div>
      <div class="ev-body">${e.body}</div>
      <div class="ev-flags-lbl">o que chama atenção aqui?</div>
      <div class="ev-flags">${flags}</div>
    </div>`;
  });
  r(HERO_HTML()+PROG(0)+`<div class="gw">
    <div class="scene-card"><div class="scene-lbl"><i class="ti ti-file-search" aria-hidden="true" style="margin-right:4px;"></i>6 evidências para analisar</div>
    <div class="scene-txt">Leia cada peça com atenção. Marque o que chamar atenção em cada uma — isso vai compor o seu diagnóstico no final.</div></div>
    ${evs}
    <button class="btn-p" onclick="showSuspeitos()">avançar para os suspeitos <i class="ti ti-arrow-right" aria-hidden="true" style="margin-left:5px;"></i></button>
  </div>`);
}

function toggleFlag(eid,flag,el){
  if(!W._flags[eid])W._flags[eid]=[];
  const i=W._flags[eid].indexOf(flag);
  if(i>=0){W._flags[eid].splice(i,1);el.classList.remove('on');}
  else{W._flags[eid].push(flag);el.classList.add('on');}
}

function showSuspeitos(){
  const cards=SUSPECTS.map(s=>`
    <div class="sus-card ${W._sus===s.id?'sel':''}" id="sc-${s.id}" onclick="pickSus('${s.id}')">
      <div class="sus-avatar" style="background:${s.bg};color:${s.c};">${s.name[0]}</div>
      <div class="sus-name">${s.name}</div>
      <div class="sus-role">${s.role}</div>
      <div class="sus-motive">${s.motive}</div>
    </div>`).join('');
  r(HERO_HTML()+PROG(1)+`<div class="gw">
    <div class="tension-card"><div class="tension-lbl"><i class="ti ti-alert-triangle" aria-hidden="true" style="margin-right:5px;"></i>quem matou a inovação?</div>
    <div class="tension-txt">Com base no que você leu, quem é o principal responsável? Clique no suspeito para ver o que pode estar por trás da escolha — antes de confirmar.</div></div>
    <div class="sus-grid">${cards}</div>
    <button class="btn-p" id="btn-sus" ${W._sus?'':'disabled'} style="${W._sus?'':'opacity:.4;cursor:not-allowed;'}" onclick="showLaudo()">confirmar e escrever o diagnóstico <i class="ti ti-arrow-right" aria-hidden="true" style="margin-left:5px;"></i></button>
  </div>`);
}

function pickSus(id){
  W._sus=id;
  SUSPECTS.forEach(s=>{const el=document.getElementById('sc-'+s.id);if(el)el.className='sus-card'+(id===s.id?' sel':'');});
  const btn=document.getElementById('btn-sus');
  if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';}
}

function showLaudo(){
  r(HERO_HTML()+PROG(2)+`<div class="gw">
    <div class="scene-card"><div class="scene-lbl"><i class="ti ti-file-pencil" aria-hidden="true" style="margin-right:4px;"></i>escreva o diagnóstico</div>
    <div class="scene-txt">Com base no que você marcou e no suspeito que escolheu, escreva o que você concluiu. O diagnóstico revela como você lê os dados — não há resposta certa, há análise mais ou menos completa.</div></div>
    <div style="margin-bottom:.85rem;">
      <div class="lbl">o que matou essa inovação?</div>
      <textarea class="ta" id="t-l" placeholder="Descreva o que aconteceu, em que ordem e qual foi o impacto. Seja direto.">${W._laudo}</textarea>
    </div>
    <div style="margin-bottom:.85rem;">
      <div class="lbl">o que o RevvoLíder poderia ter feito diferente?</div>
      <textarea class="ta" id="t-a" placeholder="Liste 2 ou 3 atitudes concretas que teriam mudado o resultado desta história.">${W._acoes}</textarea>
    </div>
    <button class="btn-p" onclick="submitLaudo()">enviar e ver o veredicto <i class="ti ti-arrow-right" aria-hidden="true" style="margin-left:5px;"></i></button>
  </div>`);
}

function submitLaudo(){
  const l=document.getElementById('t-l').value.trim();
  const a=document.getElementById('t-a').value.trim();
  if(!l||!a){alert('Preencha os dois campos antes de continuar.');return;}
  W._laudo=l;W._acoes=a;showVeredicto();
}

function showVeredicto(){
  const v=VERD[W._sus]||VERD['s4'];
  const sus=SUSPECTS.find(s=>s.id===W._sus);
  const fc=Object.values(W._flags).reduce((s,a)=>s+a.length,0);
  const pk=fc>=10?'alto':fc>=5?'medio':'baixo';
  const p=PROFILES[pk];
  r(HERO_HTML()+PROG(3)+`<div class="gw">
    <div class="lbl" style="margin-bottom:.75rem;"><i class="ti ti-gavel" aria-hidden="true" style="margin-right:4px;"></i>veredicto</div>
    <div class="verd-card">
      <div class="vtag ${v.tag}">${v.tl}</div>
      <div class="vtitle">${v.title}</div>
      <div class="vtxt">${v.txt}</div>
    </div>
    <div class="verd-card" style="display:flex;align-items:flex-start;gap:12px;">
      <div style="width:42px;height:42px;min-width:42px;border-radius:50%;background:${sus.bg};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:${sus.c};">${sus.name[0]}</div>
      <div><div style="font-size:15px;font-weight:500;color:#fff;margin-bottom:4px;">${sus.name}</div><div style="font-size:14px;color:rgba(255,255,255,.6);line-height:1.6;">${sus.motive}</div></div>
    </div>
    <div class="divider"></div>
    <div class="lbl" style="margin-bottom:.65rem;">seu perfil de investigação</div>
    <div class="profile-card">
      <div class="pname">${p.name}</div>
      <div style="font-size:12px;color:#0D8FAA;margin-bottom:6px;">${fc} pontos marcados nas evidências</div>
      <div class="pdesc">${p.desc}</div>
    </div>
    <div class="lbl" style="margin-bottom:.65rem;">3 ações para a próxima semana</div>
    ${p.actions.map((a,i)=>`<div class="act-row"><div class="act-num">${i+1}</div><div class="act-txt">${a}</div></div>`).join('')}
    <div class="divider"></div>
    <div class="share-row">
      <button class="share-btn" onclick="sendPrompt('Meu diagnóstico no CSI Revvo T2: suspeito=${sus.name}. Conclusão: ${W._laudo.substring(0,100)}... Quero aprofundar essa análise sobre ambiente de inovação.')"><i class="ti ti-messages" aria-hidden="true" style="font-size:14px;"></i>aprofundar análise ↗</button>
      <button class="share-btn" onclick="sendPrompt('Com base no perfil ${p.name}, me ajuda a criar um plano de 30 dias para mudar o ambiente de inovação do meu time.')"><i class="ti ti-checklist" aria-hidden="true" style="font-size:14px;"></i>plano de 30 dias ↗</button>
    </div>
    <button class="btn-o" onclick="restart()" style="margin-top:.5rem;"><i class="ti ti-refresh" aria-hidden="true" style="margin-right:5px;"></i>reiniciar investigação</button>
  </div>`);
}

function restart(){W._n='';W._a='';W._flags={};W._sus='';W._laudo='';W._acoes='';showEnvelope();}
showEnvelope();
</script>
